name: Test and publish blender-mcp-cli

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit and capability parity tests
        env:
          PYTHONPATH: src
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -v

  build:
    name: Build and smoke-test distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Validate Agent Skill
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh skill publish --dry-run
      - name: Build sdist and wheel
        run: python -m build
      - name: Build standalone Skill archive
        run: python scripts/build_skill_archive.py --output-dir skill-dist
      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]
          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          if tag != version:
              raise SystemExit(f"release tag {tag!r} does not match package version {version!r}")
          PY
      - name: Smoke-test wheel without MCP dependencies
        run: |
          python -m venv .smoke
          .smoke/bin/python -m pip install --no-deps dist/blender_mcp_cli-*.whl
          .smoke/bin/python - <<'PY'
          import json
          import os
          from pathlib import Path
          import subprocess
          import tomllib

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]

          command = ".smoke/bin/blender-mcp-cli"
          actual_version = subprocess.check_output(
              [command, "--version"], text=True
          ).strip()
          expected_version = f"blender-mcp-cli {version}"
          if actual_version != expected_version:
              raise SystemExit(
                  f"unexpected CLI version: {actual_version!r}; expected {expected_version!r}"
              )

          schema = json.loads(subprocess.check_output([command, "schema"], text=True))
          if not schema.get("ok") or len(schema["result"]["commands"]) < 24:
              raise SystemExit("CLI schema smoke test failed")

          skill = json.loads(
              subprocess.check_output([command, "skill", "path"], text=True)
          )["result"]
          skill_path = Path(skill["path"])
          for relative_name in (
              "SKILL.md",
              "LICENSE",
              "addon.py",
              "agents/openai.yaml",
          ):
              if not (skill_path / relative_name).is_file():
                  raise SystemExit(f"wheel is missing bundled Skill file {relative_name}")
          if (skill_path / "addon.py").read_bytes() != Path("addon.py").read_bytes():
              raise SystemExit("wheel contains an unexpected Blender add-on")

          install_target = Path(".smoke-skill").resolve()
          installed = json.loads(
              subprocess.check_output(
                  [
                      command,
                      "skill",
                      "install",
                      "--target",
                      str(install_target),
                  ],
                  text=True,
              )
          )["result"]
          if Path(installed["target"]) != install_target:
              raise SystemExit("Skill install smoke test returned the wrong target")
          for relative_name in (
              "SKILL.md",
              "LICENSE",
              "addon.py",
              "agents/openai.yaml",
          ):
              if not (install_target / relative_name).is_file():
                  raise SystemExit(f"Skill install missed {relative_name}")

          wheel = next(Path("dist").glob("blender_mcp_cli-*.whl")).resolve()
          target_site = Path(".smoke-target").resolve()
          python = ".smoke/bin/python"
          subprocess.check_call(
              [
                  python,
                  "-m",
                  "pip",
                  "install",
                  "--no-deps",
                  "--target",
                  str(target_site),
                  str(wheel),
              ]
          )
          target_environment = dict(os.environ, PYTHONPATH=str(target_site))
          target_skill = json.loads(
              subprocess.check_output(
                  [python, "-m", "blender_mcp.cli", "skill", "path"],
                  env=target_environment,
                  text=True,
              )
          )["result"]
          expected_target_skill = (
              target_site / "share/blender-mcp-cli/skills/blender-mcp-cli"
          )
          if Path(target_skill["path"]) != expected_target_skill:
              raise SystemExit("pip --target Skill discovery smoke test failed")
          PY
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
      - name: Upload standalone Skill archive
        uses: actions/upload-artifact@v7
        with:
          name: standalone-skill
          path: skill-dist/*.zip
          if-no-files-found: error
      - name: Upload Blender add-on
        uses: actions/upload-artifact@v7
        with:
          name: blender-addon
          path: addon.py
          if-no-files-found: error

  publish:
    name: Publish blender-mcp-cli to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-skill
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/blender-mcp-cli
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist/
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true

  publish-skill:
    name: Publish GitHub Release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: release-assets/
      - name: Download standalone Skill archive
        uses: actions/download-artifact@v8
        with:
          name: standalone-skill
          path: release-assets/
      - name: Download Blender add-on
        uses: actions/download-artifact@v8
        with:
          name: blender-addon
          path: release-assets/
      - name: Create or verify draft release, attach assets, and publish
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          import subprocess
          import time

          asset_dir = Path("release-assets")
          asset_groups = (
              list(asset_dir.glob("blender-mcp-cli-skill-*.zip")),
              list(asset_dir.glob("blender_mcp_cli-*.whl")),
              list(asset_dir.glob("blender_mcp_cli-*.tar.gz")),
              list(asset_dir.glob("addon.py")),
          )
          if any(len(group) != 1 for group in asset_groups):
              raise SystemExit(
                  "expected exactly one Skill ZIP, wheel, source distribution, "
                  "and Blender add-on"
              )
          assets = [group[0].resolve() for group in asset_groups]
          tag = os.environ["RELEASE_TAG"]
          repository = os.environ["GITHUB_REPOSITORY"]
          poll_interval = 2
          poll_timeout = 60

          def releases():
              return json.loads(
                  subprocess.check_output(
                      [
                          "gh",
                          "api",
                          f"repos/{repository}/releases?per_page=100",
                      ],
                      text=True,
                  )
              )

          def find_release():
              return next(
                  (item for item in releases() if item["tag_name"] == tag),
                  None,
              )

          def matching_asset(release, asset):
              matches = [
                  item for item in release["assets"] if item["name"] == asset.name
              ]
              if len(matches) > 1:
                  raise SystemExit(f"release has duplicate assets named {asset.name}")
              return matches[0] if matches else None

          def wait_for_release():
              deadline = time.monotonic() + poll_timeout
              while True:
                  release = find_release()
                  if release is not None:
                      return release
                  if time.monotonic() >= deadline:
                      return None
                  time.sleep(poll_interval)

          def wait_for_verified_asset(asset, expected_digest):
              deadline = time.monotonic() + poll_timeout
              while True:
                  release = find_release()
                  uploaded = (
                      matching_asset(release, asset)
                      if release is not None
                      else None
                  )
                  if uploaded is not None:
                      actual_digest = uploaded.get("digest")
                      if actual_digest == expected_digest:
                          return release
                      if actual_digest not in (None, ""):
                          raise SystemExit(
                              f"release asset {asset.name} has an unexpected "
                              "SHA-256 digest"
                          )
                  if time.monotonic() >= deadline:
                      raise SystemExit(
                          f"release asset {asset.name} did not become visible with "
                          "a verified SHA-256 digest before the timeout"
                      )
                  time.sleep(poll_interval)

          release = find_release()
          if release is None:
              subprocess.check_call(
                  [
                      "gh",
                      "release",
                      "create",
                      tag,
                      "--repo",
                      repository,
                      "--verify-tag",
                      "--draft",
                      "--generate-notes",
                      "--title",
                      tag,
                  ]
              )
              release = wait_for_release()
          if release is None:
              raise SystemExit(
                  f"could not find draft release for {tag} before the timeout"
              )

          for asset in assets:
              expected_digest = (
                  "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest()
              )
              existing = matching_asset(release, asset)

              if existing is None:
                  if not release["draft"]:
                      raise SystemExit(
                          f"published release {tag} is missing {asset.name}; "
                          "publish from a version tag so all assets are attached "
                          "while draft"
                      )
                  subprocess.check_call(
                      [
                          "gh",
                          "release",
                          "upload",
                          tag,
                          str(asset),
                          "--repo",
                          repository,
                      ]
                  )
              release = wait_for_verified_asset(asset, expected_digest)

          if release["draft"]:
              subprocess.check_call(
                  [
                      "gh",
                      "release",
                      "edit",
                      tag,
                      "--repo",
                      repository,
                      "--draft=false",
                  ]
              )
          PY
